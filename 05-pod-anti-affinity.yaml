      #HARD
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: purpose
                  operator: In
                  values:
                    - pod-anti-affinity-practice
            topologyKey: topology.kubernetes.io/zone
  containers:
  - name: catalogue
